const visP=()=>{
  const l=agLeads();

      const isAssigned=(p.asesor||"").toLowerCase()===myAsesor;
      const isReasignedToMe=(p.reasignacion||"").toLowerCase()===myAsesor;
      // Vendedor does NOT see lead if it was reasigned away from them
      const reasignadoFuera=p.reasignacion&&(p.reasignacion.toLowerCase()!==myAsesor);

      if(!isAssigned&&!isReasignedToMe)return false;

  // ── Data ──
  const estatusCounts=["En Proceso","Muy Interesado","No Viable","Venta Cerrada"].map(s=>vp.filter(p=>p.estatus===s).length);
  const diasConLeads=[...new Set(vp.map(p=>p.dia))].sort((a,b)=>a-b);
  const diasVals=diasConLeads.map(d=>vp.filter(p=>p.dia===d).length);

  const medios=["Sitio Web","Medios Digitales","WhatsApp","Facebook","IA","Mercado Libre","Correo","Instagram","TikTok","Das Welt"];
  const medioData=medios.map(m=>{
    const ml=vp.filter(p=>p.fuente===m);
    const ep=ml.filter(p=>p.estatus==="En Proceso").length;
    const nv=ml.filter(p=>p.estatus==="No Viable").length;
    const mi=ml.filter(p=>p.estatus==="Muy Interesado").length;
    const vc=ml.filter(p=>p.estatus==="Venta Cerrada").length;
    return{m,ep,nv,mi,vc,t:ml.length,tc:ml.length>0?(vc/ml.length*100).toFixed(1):0};
  }).filter(m=>m.t>0);

  const modelData=MODELOS_VW.map(mod=>{
    const ml=vp.filter(p=>p.auto===mod);
    const nuevo=ml.filter(p=>p.tipo==="Nuevo").length;
    const usado=ml.filter(p=>p.tipo==="Usado").length;
    const vc=ml.filter(p=>p.estatus==="Venta Cerrada").length;
    return{mod,nuevo,usado,t:ml.length,vc,tc:ml.length>0?(vc/ml.length*100).toFixed(0):0};
  }).filter(m=>m.t>0).sort((a,b)=>b.t-a.t);

    <div style="font-size:9px;font-weight:700;color:${CLR.blue3};text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">✦ Asistente IA · Acciones Rápidas</div>

  // ── Charts ──

    ['chartEstatus','chartDias','chartFuente','chartAsesores','chartModelos','chartTipo','chartMeses'].forEach(id=>{
      const el=document.getElementById(id);
      if(el&&el._chartInstance){el._chartInstance.destroy();el._chartInstance=null;}

      const el=document.getElementById(id);if(!el)return null;
      // Check if data is empty
      const data=cfg.data?.datasets?.[0]?.data||[];
      const hasData=Array.isArray(data)?data.some(v=>v>0):(data!==null&&data!==undefined);

        ctx.clearRect(0,0,el.width,el.height);

      }

    const TTP={backgroundColor:"#0f4c81",titleColor:"#fff",bodyColor:"#a8cdf0",padding:10,cornerRadius:4,displayColors:false};
    const SC={grid:{color:GRD},ticks:{font:{size:9,family:"'DM Sans',sans-serif"},color:TCK}};
    const BASE={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};

    // 1. Donut pipeline

    // 2. Barras días con gradiente azul
    mkChart('chartDias',{type:"bar",data:{labels:diasConLeads.map(d=>`D${d}`),datasets:[{data:diasVals,backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,160);g.addColorStop(0,"#1a6ab1");g.addColorStop(1,"rgba(26,106,177,.2)");return g;},borderColor:"#2e86de",borderWidth:1,borderRadius:3,hoverBackgroundColor:"#0f4c81"}]},options:{...BASE,scales:{x:{...SC,grid:{display:false},ticks:{...SC.ticks,maxRotation:0}},y:{...SC,beginAtZero:true,ticks:{...SC.ticks,stepSize:1}}},plugins:{legend:{display:false},tooltip:{...TTP,callbacks:{label:c=>`  ${c.parsed.y} leads`}}}}});

    // 3. Donut fuente
    mkChart('chartFuente',{type:"doughnut",data:{labels:fuenteData.map(f=>f.l),datasets:[{data:fuenteData.map(f=>f.v),backgroundColor:MIX.slice(0,fuenteData.length),borderWidth:2,borderColor:"#fff",hoverOffset:5}]},options:{...BASE,cutout:"50%",plugins:{legend:{display:true,position:"right",labels:{font:{size:9,family:"'DM Sans',sans-serif"},color:LBL,boxWidth:9,padding:7}},tooltip:{...TTP,displayColors:true,callbacks:{label:c=>`  ${c.label}: ${c.parsed} (${pct(c.parsed,K.t)}%)`}}}}});

    // 4. Agrupadas asesores
    mkChart('chartAsesores',{type:"bar",data:{labels:aseLabels.map(a=>a.split(" ")[0]),datasets:[{label:"Leads",data:aseLeads,backgroundColor:"#2e86de",borderRadius:3,borderSkipped:false},{label:"Ventas",data:aseVentas,backgroundColor:"#00a86b",borderRadius:3,borderSkipped:false}]},options:{...BASE,scales:{x:{...SC,grid:{display:false},ticks:{...SC.ticks,color:LBL}},y:{...SC,beginAtZero:true,ticks:{...SC.ticks,stepSize:1}}},plugins:{legend:{display:true,position:"top",align:"end",labels:{font:{size:9,family:"'DM Sans',sans-serif"},color:LBL,boxWidth:9,boxHeight:9,padding:8,usePointStyle:true,pointStyle:"circle"}},tooltip:TTP}}});

    // 5. Barras horizontales modelos
    const mc=Object.entries(vp.reduce((a,p)=>{a[p.auto]=(a[p.auto]||0)+1;return a},{})).sort((a,b)=>b[1]-a[1]).slice(0,8);
    mkChart('chartModelos',{type:"bar",data:{labels:mc.map(([m])=>m),datasets:[{data:mc.map(([,n])=>n),backgroundColor:BLUE.concat(BLUE).slice(0,mc.length),borderRadius:3,borderSkipped:false}]},options:{...BASE,indexAxis:"y",scales:{x:{...SC,beginAtZero:true,ticks:{...SC.ticks,stepSize:1}},y:{...SC,grid:{display:false},ticks:{...SC.ticks,color:LBL}}},plugins:{legend:{display:false},tooltip:TTP}}});

    // 6. Barras tipo
    mkChart('chartTipo',{type:"bar",data:{labels:["Nuevos","Usados"],datasets:[{data:[vcNuevo,vcUsado],backgroundColor:["#2e86de","#00b4a6"],borderRadius:4,borderSkipped:false}]},options:{...BASE,scales:{x:{...SC,grid:{display:false},ticks:{...SC.ticks,color:LBL}},y:{...SC,beginAtZero:true,ticks:{...SC.ticks,stepSize:1}}},plugins:{legend:{display:false},tooltip:TTP}}});

    // 7. Línea comportamiento mensual
    mkChart('chartMeses',{type:"line",data:{labels:mesChartData.map(m=>m.mes),datasets:[
      {label:"Leads",data:mesChartData.map(m=>m.t),borderColor:"#2e86de",backgroundColor:"rgba(46,134,222,.12)",fill:true,tension:.4,pointRadius:3,pointBackgroundColor:"#2e86de",pointBorderColor:"#fff",pointBorderWidth:2},
      {label:"Viables",data:mesChartData.map(m=>m.viables),borderColor:"#5ba4e5",borderDash:[4,3],backgroundColor:"transparent",tension:.4,pointRadius:3,pointBackgroundColor:"#5ba4e5",pointBorderColor:"#fff",pointBorderWidth:2},
      {label:"Ventas",data:mesChartData.map(m=>m.vc),borderColor:"#00a86b",backgroundColor:"rgba(0,168,107,.1)",fill:true,tension:.4,pointRadius:4,pointBackgroundColor:"#00a86b",pointBorderColor:"#fff",pointBorderWidth:2}
    ]},options:{...BASE,scales:{x:{...SC,grid:{display:false}},y:{...SC,beginAtZero:true,ticks:{...SC.ticks,stepSize:1}}},plugins:{legend:{display:true,position:"top",align:"end",labels:{font:{size:9,family:"'DM Sans',sans-serif"},color:LBL,boxWidth:10,padding:8,usePointStyle:true,pointStyle:"circle"}},tooltip:TTP}}});
  });
}

function wireProspList(){
  document.querySelectorAll(".rp[data-id]").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=parseInt(el.dataset.id);
      sel=(agLeads()||[]).find(p=>p.id===id)||null;
      document.querySelectorAll(".rp[data-id]").forEach(r=>r.classList.toggle("sel",parseInt(r.dataset.id)===id));
      document.getElementById("prospDetail").innerHTML=sel?renderProspDetail():"";
      wireProspDetail(document.getElementById("prospDetail"));
    });
  });

function wireProspDetail(container){
  container?.querySelector("#editLeadBtn")?.addEventListener("click",()=>openLeadModal(sel));
  container?.querySelector("#delLeadBtn")?.addEventListener("click",()=>{
    if(!confirm(`¿Eliminar el lead de ${sel.nombre} ${sel.apellido}? Esta acción no se puede deshacer.`))return;
    leads[agId]=leads[agId].filter(p=>p.id!==sel.id);
    sel=null;
    toast("✓ Lead eliminado");saveState();
    renderContent();refreshSidebar();
  });
  container?.querySelector("#aiLeadBtn")?.addEventListener("click",()=>{aiOpen=true;render();});
  container?.querySelectorAll(".est-chip").forEach(b=>b.addEventListener("click",()=>{
    if(!can("edit"))return;
    sel.estatus=b.dataset.s;
    const logE={fecha:new Date().toLocaleString("es-MX"),usuario:sess.nombre,accion:`Cambió estatus a: ${sel.estatus}`};
    sel.historial=[...(sel.historial||[]),logE];
    const l=agLeads();const idx=l.findIndex(p=>p.id===sel.id);if(idx>=0)l[idx]=sel;
    toast("✓ Estatus actualizado");saveState();refreshSidebar();
    document.getElementById("prospDetail").innerHTML=renderProspDetail();
    wireProspDetail(document.getElementById("prospDetail"));
    wireProspList();
  }));
  container?.querySelectorAll(".sel-ai-btn").forEach(b=>b.addEventListener("click",()=>{
    const inp=document.getElementById("aiIn");
    if(inp)inp.value=b.dataset.prompt;

  <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:16px">
    <div><h1 style="font-size:20px">Pipeline · ${info?.n}</h1><p style="font-size:11px;color:#707582;margin-top:2px">${vp.length} prospectos activos</p></div>

  </div>

    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:7px 11px;background:${x.bg};border:1px solid ${x.bd};border-top:3px solid ${x.c}">

        <span style="font-size:14px;font-family:'Outfit',sans-serif;font-weight:800;color:${x.c}">${col.length}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${col.map(p=>`<div class="card pipe-card" data-id="${p.id}" style="padding:12px;cursor:pointer;border-top:2px solid ${x.c};transition:box-shadow .15s">
          <div style="font-weight:700;font-size:12px;margin-bottom:2px">${p.nombre} ${p.apellido}</div>
          <div style="font-size:10px;color:#707582;margin-bottom:5px">${p.auto} · ${(p.asesor||"").split(" ")[0]}</div>
          ${p.fCita?`<div style="font-size:9px;color:${x.c};font-weight:600">📅 ${p.fCita}</div>`:""}
        </div>`).join("")}
      </div>
    </div>`;}).join("")}
  </div>`;

  el.querySelector("#pipeQ")?.addEventListener("input",e=>{

    document.querySelectorAll(".pipe-card").forEach(card=>{
      const id=parseInt(card.dataset.id);
      const p=(agLeads()||[]).find(x=>x.id===id);
      if(!p)return;
      const match=!q||`${p.nombre} ${p.apellido}`.toLowerCase().includes(q)||p.auto.toLowerCase().includes(q)||(p.asesor||"").toLowerCase().includes(q);
      card.parentElement.style.display=match?"":"none";

}

// ── USUARIOS ──────────────────────────────────────────────────────────────────
function renderCitas(el){
  const today=new Date(); today.setHours(0,0,0,0);
  const all=agLeads();
  const withCita=all.filter(p=>p.cita==="SI"&&p.fCita);
  // Split: hoy, próximas 7 días, pasadas sin realizar
  const toDate=s=>{ const [y,m,d]=s.split("-").map(Number); const dt=new Date(y,m-1,d); return dt; };
  const todayStr=today.toISOString().slice(0,10);
  const in7=new Date(today); in7.setDate(in7.getDate()+7);

  const citasHoy    = withCita.filter(p=>p.fCita===todayStr);
  const citasProx   = withCita.filter(p=>p.fCita>todayStr&&toDate(p.fCita)<=in7);
  const citasPend   = withCita.filter(p=>p.fCita<todayStr&&p.citaReal!=="SI");
  const citasReal   = withCita.filter(p=>p.citaReal==="SI");

  // Filter by role
  const filterRole = list => sess?.rol==="vendedor"
    ? list.filter(p=>(p.reasignacion||p.asesor||"").toLowerCase()===(sess.asesor||"").toLowerCase())
    : list;

  const citRow=(p,highlight="")=>{
    const sc=SC[p.estatus]||SC["No Viable"];
    return `<tr style="background:${highlight}" class="cita-row" data-id="${p.id}">
      <td style="padding:6px 12px;font-weight:600">${p.nombre} ${p.apellido}</td>
      <td style="padding:6px 10px">${p.auto}${p.version?` · ${p.version.split(" ").slice(-2).join(" ")}`:""}</td>
      <td style="padding:6px 10px;font-weight:700;color:#0f4c81">${p.fCita}</td>
      <td style="padding:6px 10px;font-size:11px;color:#707582">${p.asesor||"—"}</td>
      <td style="padding:6px 10px"><span class="pill" style="background:${sc.bg};color:${sc.c};border-color:${sc.bd}">${p.estatus}</span></td>
      <td style="padding:6px 10px">
        <span style="font-size:10px;font-weight:700;padding:2px 7px;background:${p.confirmaCita==="SI"?"#d1fae5":"#fef3c7"};color:${p.confirmaCita==="SI"?"#065f46":"#92400e"}">${p.confirmaCita==="SI"?"Confirmada":"Sin confirmar"}</span>
      </td>
      <td style="padding:6px 10px">
        <span style="font-size:10px;font-weight:700;padding:2px 7px;background:${p.citaReal==="SI"?"#d1fae5":"#f1f5f9"};color:${p.citaReal==="SI"?"#065f46":"#94a3b8"}">${p.citaReal==="SI"?"Realizada":"Pendiente"}</span>
      </td>
      <td style="padding:6px 10px"><button class="btn out sm edit-cita-btn" data-id="${p.id}" style="font-size:9px">Editar</button></td>
    </tr>`;
  };

  const citTable=(list,emptyMsg)=>list.length===0
    ? `<div style="padding:18px;text-align:center;color:#94a3b8;font-size:12px">${emptyMsg}</div>`
    : `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:#1a6ab1">
          <th style="padding:6px 12px;color:#fff;font-size:9px;text-align:left;font-weight:700;text-transform:uppercase">Prospecto</th>
          <th style="padding:6px 10px;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase">Vehículo</th>
          <th style="padding:6px 10px;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase">Fecha Cita</th>
          <th style="padding:6px 10px;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase">Asesor</th>
          <th style="padding:6px 10px;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase">Estatus</th>
          <th style="padding:6px 10px;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase">Confirmación</th>
          <th style="padding:6px 10px;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase">Realizada</th>
          <th style="padding:6px 10px;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase"></th>
        </tr></thead>
        <tbody>${list.map((p,i)=>citRow(p,i%2===0?"#fff":"#f0f4f8")).join("")}</tbody>
      </table></div>`;

  const sh=(t,n,c)=>`<div style="background:${c};padding:7px 14px;display:flex;align-items:center;justify-content:space-between"><span style="color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.3px">${t}</span><span style="background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">${n}</span></div>`;

  const hoy=filterRole(citasHoy), prox=filterRole(citasProx), pend=filterRole(citasPend), real=filterRole(citasReal);

  el.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div><h1 style="font-size:20px">Citas · Auto Haus ${agInfo()?.n}</h1><p style="font-size:11px;color:#707582;margin-top:2px">${withCita.length} citas registradas</p></div>
    <button class="btn pri" id="citaAddBtn" style="background:#0f4c81;font-size:12px;padding:9px 16px">+ Nuevo Lead con Cita</button>
  </div>

  <!-- KPIs citas -->
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:16px">
    <div style="background:#fff;border:1px solid #e2e8f0;border-top:3px solid #e03131;padding:12px 14px">
      <div style="font-size:22px;font-family:'Outfit',sans-serif;font-weight:800;color:#e03131">${hoy.length}</div>
      <div style="font-size:9px;color:#707582;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-top:3px">Citas Hoy</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-top:3px solid #f5a623;padding:12px 14px">
      <div style="font-size:22px;font-family:'Outfit',sans-serif;font-weight:800;color:#f5a623">${prox.length}</div>
      <div style="font-size:9px;color:#707582;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-top:3px">Próximos 7 días</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-top:3px solid #e03131;padding:12px 14px">
      <div style="font-size:22px;font-family:'Outfit',sans-serif;font-weight:800;color:#e03131">${pend.length}</div>
      <div style="font-size:9px;color:#707582;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-top:3px">Vencidas sin realizar</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-top:3px solid #00a86b;padding:12px 14px">
      <div style="font-size:22px;font-family:'Outfit',sans-serif;font-weight:800;color:#00a86b">${real.length}</div>
      <div style="font-size:9px;color:#707582;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-top:3px">Realizadas</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-top:3px solid #2e86de;padding:12px 14px">
      <div style="font-size:22px;font-family:'Outfit',sans-serif;font-weight:800;color:#2e86de">${real.length>0?Math.round(real.length/filterRole(withCita).length*100):0}%</div>
      <div style="font-size:9px;color:#707582;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-top:3px">Tasa Realización</div>
    </div>
  </div>

  ${hoy.length>0?`<div style="background:#fef2f2;border:1px solid #fca5a5;border-left:4px solid #e03131;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:12px">
    <span style="font-size:18px">🔔</span>
    <strong style="color:#e03131">${hoy.length} cita${hoy.length>1?"s":""} programada${hoy.length>1?"s":""} para HOY:</strong>
    <span style="color:#404759">${hoy.map(p=>`${p.nombre} ${p.apellido.charAt(0)}. (${p.auto})`).join(" · ")}</span>
  </div>`:""}

  ${pend.length>0?`<div style="background:#fef3c7;border:1px solid #fcd34d;border-left:4px solid #f5a623;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#92400e">
    ⚠ <strong>${pend.length} cita${pend.length>1?"s":""} vencida${pend.length>1?"s":""}</strong> sin marcar como realizadas — revisa y actualiza el estatus.
  </div>`:""}

  <!-- Citas hoy -->
  ${hoy.length>0?`<div class="card" style="overflow:hidden;margin-bottom:12px">${sh("📅 Citas de Hoy",hoy.length,"#e03131")}${citTable(hoy,"")}</div>`:""}

  <!-- Próximas 7 días -->
  <div class="card" style="overflow:hidden;margin-bottom:12px">
    ${sh("📆 Próximas Citas (7 días)",prox.length,"#0f4c81")}
    ${citTable(prox,"No hay citas programadas para los próximos 7 días")}
  </div>

  <!-- Vencidas sin realizar -->
  ${pend.length>0?`<div class="card" style="overflow:hidden;margin-bottom:12px">${sh("⚠ Citas Vencidas Sin Realizar",pend.length,"#f5a623")}${citTable(pend,"")}</div>`:""}

  <!-- Realizadas -->
  <div class="card" style="overflow:hidden;margin-bottom:12px">
    ${sh("✓ Citas Realizadas",real.length,"#00a86b")}
    ${citTable(real,"Aún no hay citas realizadas")}
  </div>`;

  el.querySelector("#citaAddBtn")?.addEventListener("click",()=>openLeadModal());
  el.querySelectorAll(".edit-cita-btn,.cita-row").forEach(btn=>{
    btn.addEventListener("click",e=>{
      const id=parseInt(btn.dataset.id||btn.closest("[data-id]")?.dataset.id);
      const p=(agLeads()||[]).find(x=>x.id===id);
      if(p){sel=p;tab="prospectos";renderContent();}
    });
  });
}

function setCatalog(id,list){
  if(id==="modelos")mods=list;
  else if(id==="anuncios")anus=list;
  else if(id==="razones")razs=list;
  else if(id==="versiones"){
    // Parse "Modelo: Version" format back into VW_VERSIONS
    list.forEach(entry=>{
      const sep=entry.indexOf(": ");
      if(sep<0)return;
      const modelo=entry.substring(0,sep);
      const version=entry.substring(sep+2);
      if(!VW_VERSIONS[modelo])VW_VERSIONS[modelo]=[];
      if(!VW_VERSIONS[modelo].includes(version))VW_VERSIONS[modelo].push(version);
    });
    // Also remove versions not in list
    Object.keys(VW_VERSIONS).forEach(m=>{
      VW_VERSIONS[m]=VW_VERSIONS[m].filter(v=>list.includes(m+": "+v));
    });
  }
}

  estatus:l.estatus||"En Proceso", razon:l.razon||null, cita:l.cita||"NO",
  f_cita:l.fCita||null, confirma_cita:l.confirmaCita||null,
  cita_real:l.citaReal||"NO", prueba:l.prueba||"NO", f_venta:l.fVenta||null,
  reasignacion:l.reasignacion||null, asesor_original:l.asesorOriginal||null,
  fecha_reasignacion:l.fechaReasignacion||null, historial:l.historial||[],
  updated_at:new Date().toISOString()
});
const db2l = r => ({
  id:r.id, agencia:r.agencia_id, fuente:r.fuente, anuncio:r.anuncio,
  mes:r.mes, dia:r.dia, nombre:r.nombre, apellido:r.apellido, tel:r.tel,
  email:r.email, primerContacto:r.primer_contacto, respondio:r.respondio,
  auto:r.auto, version:r.version, tipo:r.tipo, asesor:r.asesor, notas:r.notas,
  estatus:r.estatus, razon:r.razon, cita:r.cita, fCita:r.f_cita,
  confirmaCita:r.confirma_cita, citaReal:r.cita_real, prueba:r.prueba,
  fVenta:r.f_venta, reasignacion:r.reasignacion, asesorOriginal:r.asesor_original,
  fechaReasignacion:r.fecha_reasignacion, historial:r.historial||[]
});
const u2db = u => ({
  ...(u.id&&typeof u.id==="string"&&u.id.includes("-")?{id:u.id}:{}),
  nombre:u.nombre, apellido:u.apellido, tel:u.tel||null, email:u.email,
  pwd:u.pwd, rol:u.rol, agencia_id:u.agencia||null, asesor:u.asesor||null,
  activo:u.activo!==false
});
const db2u = r => ({id:r.id,nombre:r.nombre,apellido:r.apellido,tel:r.tel,email:r.email,pwd:r.pwd,rol:r.rol,agencia:r.agencia_id,asesor:r.asesor,activo:r.activo});

// ── Loader UI ─────────────────────────────────────────────────────────────
function showLoader(msg){
  let el=document.getElementById("sbLoader");
  if(!el){el=document.createElement("div");el.id="sbLoader";document.body.appendChild(el);}
  el.style.cssText="position:fixed;inset:0;background:#0f4c81;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:'DM Sans',sans-serif";
  el.innerHTML=`<div style="text-align:center;color:#fff">
    <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:28px;margin-bottom:6px">Auto Haus<sup style="font-size:13px;font-weight:400">®</sup></div>
    <div style="font-size:10px;opacity:.6;margin-bottom:28px;letter-spacing:2px;text-transform:uppercase">CRM &middot; Red de Agencias VW</div>
    <div style="width:38px;height:38px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px"></div>
    <div style="font-size:12px;opacity:.75">${msg}</div>
  </div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
}
function hideLoader(){document.getElementById("sbLoader")?.remove();}
function warnToast(msg){
  const el=document.createElement("div");
  el.style.cssText="position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#f5a623;color:#fff;padding:10px 18px;font-size:11px;font-weight:700;z-index:600;letter-spacing:.3px;text-transform:uppercase;box-shadow:0 4px 16px rgba(0,0,0,.2)";
  el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),5000);
}

// ── localStorage fallback ─────────────────────────────────────────────────
const LS_KEY="autohaus_crm_v1";
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify({leads,users,aseMap,mods,anus,razs,savedAt:new Date().toISOString()}));}catch(e){}}
function loadState(){try{const s=JSON.parse(localStorage.getItem(LS_KEY)||"null");if(!s)return false;if(s.leads)leads=s.leads;if(s.users)users=s.users;if(s.aseMap)aseMap=s.aseMap;if(s.mods)mods=s.mods;if(s.anus)anus=s.anus;if(s.razs)razs=s.razs;return true;}catch(e){return false;}}
function clearState(){if(!confirm("¿Borrar todos los datos y reiniciar?"))return;localStorage.removeItem(LS_KEY);location.reload();}

// ── LOAD from Supabase ────────────────────────────────────────────────────
async function loadFromSupabase(){
  try{
    showLoader("Conectando con la base de datos...");
    const [dbLeads,dbUsers,dbCats] = await Promise.all([
      sbGet("leads","?select=*&order=created_at.desc"),
      sbGet("usuarios","?select=*&order=nombre.asc"),
      sbGet("catalogos","?select=*&order=valor.asc"),
    ]);
    leads={"ag1":[],"ag2":[],"ag3":[],"ag4":[]};
    dbLeads.forEach(r=>{const l=db2l(r);if(!leads[l.agencia])leads[l.agencia]=[];leads[l.agencia].push(l);});
    users=dbUsers.map(db2u);
    aseMap={"ag1":[],"ag2":[],"ag3":[],"ag4":[]};
    users.filter(u=>u.activo&&u.rol==="vendedor"&&u.agencia&&u.asesor).forEach(u=>{
      if(!aseMap[u.agencia])aseMap[u.agencia]=[];
      if(!aseMap[u.agencia].includes(u.asesor))aseMap[u.agencia].push(u.asesor);
    });
    const cm={};dbCats.forEach(c=>{if(!cm[c.tipo])cm[c.tipo]=[];cm[c.tipo].push(c.valor);});
    if(cm.modelos?.length)mods=cm.modelos;
    if(cm.anuncios?.length)anus=cm.anuncios;
    if(cm.razones?.length)razs=cm.razones;
    hideLoader();return true;
  }catch(e){
    console.error("Supabase error:",e);
    hideLoader();loadState();
    warnToast("Sin conexion a BD - usando datos locales");
    return false;
  }
}

// ── DB operations ─────────────────────────────────────────────────────────
async function dbSaveLead(lead,isNew){
  try{
    const d=l2db(lead);
    if(isNew){delete d.id;const r=await sbPost("leads",[d]);return r[0]?.id;}
    else{await sbPatch("leads",`id=eq.${lead.id}`,d);return lead.id;}
  }catch(e){console.error("dbSaveLead:",e);saveState();}
}
async function dbDeleteLead(id){try{await sbDel("leads",`id=eq.${id}`);}catch(e){console.error(e);saveState();}}
async function dbUpdateEstatus(id,estatus,historial){try{await sbPatch("leads",`id=eq.${id}`,{estatus,historial,updated_at:new Date().toISOString()});}catch(e){console.error(e);saveState();}}
async function dbSaveUser(user,isNew){
  try{
    const d=u2db(user);
    if(isNew){delete d.id;const r=await sbPost("usuarios",[d]);return r[0]?.id;}
    else{await sbPatch("usuarios",`id=eq.${user.id}`,d);return user.id;}
  }catch(e){console.error("dbSaveUser:",e);saveState();}
}
async function dbDeleteUser(id){try{await sbDel("usuarios",`id=eq.${id}`);}catch(e){console.error(e);saveState();}}
async function dbToggleUser(id,activo){try{await sbPatch("usuarios",`id=eq.${id}`,{activo});}catch(e){console.error(e);saveState();}}
async function dbSaveCatalog(tipo,valores,agId){
  try{
    const q=agId?`tipo=eq.${tipo}&agencia_id=eq.${agId}`:`tipo=eq.${tipo}`;
    await sbDel("catalogos",q);
    if(valores.length)await sbPost("catalogos",valores.map(v=>({tipo,valor:v,agencia_id:agId||null})));
  }catch(e){console.error(e);saveState();}
}
async function dbLogin(email,pwd){
  try{
    const r=await sbGet("usuarios",`?email=eq.${encodeURIComponent(email)}&pwd=eq.${encodeURIComponent(pwd)}&activo=eq.true&select=*`);
    return r.length?db2u(r[0]):null;
  }catch(e){console.error(e);return users.find(u=>u.activo&&u.email===email&&u.pwd===pwd)||null;}
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
loadState();
render();
</script>
