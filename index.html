.pb{height:4px;background:var(--c2);overflow:hidden}.pf{height:100%;background:var(--c1)}

.mbg{position:fixed;inset:0;background:rgba(17,25,46,.55);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(2px)}
.mbox{background:var(--w);width:600px;max-width:96vw;max-height:91vh;overflow-y:auto;box-shadow:0 20px 60px rgba(17,25,46,.25);border-top:3px solid var(--c1)}

[data-view]{display:none}[data-view].active{display:flex}

// Helper: days between two ISO strings
const daysBetween=(a,b)=>{if(!a||!b)return null;const d=Math.round((new Date(b)-new Date(a))/(1000*60*60*24));return d>=0?d:null;};

const kpi=(list)=>{
  const t=list.length,ep=list.filter(x=>x.estatus==="En Proceso").length,mi=list.filter(x=>x.estatus==="Muy Interesado").length,nv=list.filter(x=>x.estatus==="No Viable").length,vc=list.filter(x=>x.estatus==="Venta Cerrada").length;

  const ventasConTs=list.filter(x=>x.estatus==="Venta Cerrada"&&x.tsRegistro&&x.tsVenta);

    ? Math.round(ventasConTs.reduce((s,x)=>s+daysBetween(x.tsRegistro,x.tsVenta),0)/ventasConTs.length)
    : null;
  return{t,ep,mi,nv,vc,cp,cr,pr,viab:t>0?Math.round((ep+mi+vc)/t*100):0,tcv:(t-nv)>0?Math.round(vc/(t-nv)*100):0,tcc:cp>0?Math.round(cr/cp*100):0,avgDias};
};

const visP=()=>{
  const l=agLeads();
  return l.filter(p=>{
    if(sess?.rol==="vendedor"){
      const myAsesor=(sess.asesor||"").toLowerCase();
      // Vendedor sees lead if currently assigned to them OR was reasigned TO them
      const isAssigned=(p.asesor||"").toLowerCase()===myAsesor;
      const isReasignedToMe=(p.reasignacion||"").toLowerCase()===myAsesor;
      // Vendedor does NOT see lead if it was reasigned away from them
      const reasignadoFuera=p.reasignacion&&(p.reasignacion.toLowerCase()!==myAsesor);
      if(reasignadoFuera&&!isReasignedToMe)return false;
      if(!isAssigned&&!isReasignedToMe)return false;

                <td style="padding:4px 10px;font-weight:800;color:#fff;font-size:10px;text-transform:uppercase">TOTAL</td>
                <td style="padding:4px 8px;text-align:center;font-weight:800;color:#fff">${tot}</td>
                <td style="padding:4px 8px;text-align:center;font-weight:800;color:#fff">${totV}</td>
                <td style="padding:4px 8px;text-align:center;font-weight:800;color:#7fffd4">${totVC}</td>

      ${[["📊 Analizar Pipeline","Analiza mi pipeline y dame 3 recomendaciones concretas para mejorar conversiones."],["📧 Email Seguimiento","Email para prospecto interesado en Jetta que no confirma cita."],["💬 WhatsApp Cierre","WhatsApp para cerrar con cliente que hizo prueba de manejo."],["📞 Script Llamada","Script para llamar a prospecto sin respuesta 5 días."],["📈 Reporte","Resumen ejecutivo del mes con KPIs principales y áreas de oportunidad."]].map(([l,p])=>`<button class="btn out sm ai-quick" data-prompt="${p}" style="font-size:10px;border-color:${CLR.blue4};color:${CLR.blue2}">${l}</button>`).join("")}

  // ── Charts ──
  requestAnimationFrame(()=>{
    // Destroy existing chart instances to prevent memory leak
    ['chartEstatus','chartDias','chartFuente','chartAsesores','chartModelos','chartTipo','chartMeses'].forEach(id=>{
      const el=document.getElementById(id);
      if(el&&el._chartInstance){el._chartInstance.destroy();el._chartInstance=null;}
    });
    const mkChart=(id,cfg)=>{
      const el=document.getElementById(id);if(!el)return null;
      // Check if data is empty
      const data=cfg.data?.datasets?.[0]?.data||[];
      const hasData=Array.isArray(data)?data.some(v=>v>0):(data!==null&&data!==undefined);
      if(!hasData){
        const ctx=el.getContext('2d');
        ctx.clearRect(0,0,el.width,el.height);
        ctx.fillStyle='#94a3b8';ctx.font='12px DM Sans,sans-serif';ctx.textAlign='center';
        ctx.fillText('Sin datos disponibles',el.width/2,el.height/2);
        return null;
      }
      const c=new Chart(el,cfg);el._chartInstance=c;return c;
    };
    const BLUE=["#0f4c81","#1a6ab1","#2e86de","#5ba4e5","#a8cdf0"];
    const MIX=["#2e86de","#00b4a6","#f5a623","#00a86b","#e03131","#5ba4e5","#0f4c81","#a8cdf0","#1a6ab1","#00b4a6"];
    const GRD="#e2e8f0",TCK="#94a3b8",LBL="#2d3748";
    const TTP={backgroundColor:"#0f4c81",titleColor:"#fff",bodyColor:"#a8cdf0",padding:10,cornerRadius:4,displayColors:false};
    const SC={grid:{color:GRD},ticks:{font:{size:9,family:"'DM Sans',sans-serif"},color:TCK}};
    const BASE={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};

    // 1. Donut pipeline
    mkChart('chartEstatus',{type:"doughnut",data:{labels:["En Proceso","Muy Interesado","No Viable","Venta Cerrada"],datasets:[{data:estatusCounts,backgroundColor:["#f5a623","#00b4a6","#94a3b8","#00a86b"],borderWidth:3,borderColor:"#fff",hoverOffset:6}]},options:{...BASE,cutout:"72%",plugins:{legend:{display:false},tooltip:{...TTP,displayColors:true,callbacks:{label:c=>`  ${c.label}: ${c.parsed}`}}}}});

    // 2. Barras días con gradiente azul
    mkChart('chartDias',{type:"bar",data:{labels:diasConLeads.map(d=>`D${d}`),datasets:[{data:diasVals,backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,160);g.addColorStop(0,"#1a6ab1");g.addColorStop(1,"rgba(26,106,177,.2)");return g;},borderColor:"#2e86de",borderWidth:1,borderRadius:3,hoverBackgroundColor:"#0f4c81"}]},options:{...BASE,scales:{x:{...SC,grid:{display:false},ticks:{...SC.ticks,maxRotation:0}},y:{...SC,beginAtZero:true,ticks:{...SC.ticks,stepSize:1}}},plugins:{legend:{display:false},tooltip:{...TTP,callbacks:{label:c=>`  ${c.parsed.y} leads`}}}}});

    // 3. Donut fuente
    mkChart('chartFuente',{type:"doughnut",data:{labels:fuenteData.map(f=>f.l),datasets:[{data:fuenteData.map(f=>f.v),backgroundColor:MIX.slice(0,fuenteData.length),borderWidth:2,borderColor:"#fff",hoverOffset:5}]},options:{...BASE,cutout:"50%",plugins:{legend:{display:true,position:"right",labels:{font:{size:9,family:"'DM Sans',sans-serif"},color:LBL,boxWidth:9,padding:7}},tooltip:{...TTP,displayColors:true,callbacks:{label:c=>`  ${c.label}: ${c.parsed} (${pct(c.parsed,K.t)}%)`}}}}});

    // 4. Agrupadas asesores
    mkChart('chartAsesores',{type:"bar",data:{labels:aseLabels.map(a=>a.split(" ")[0]),datasets:[{label:"Leads",data:aseLeads,backgroundColor:"#2e86de",borderRadius:3,borderSkipped:false},{label:"Ventas",data:aseVentas,backgroundColor:"#00a86b",borderRadius:3,borderSkipped:false}]},options:{...BASE,scales:{x:{...SC,grid:{display:false},ticks:{...SC.ticks,color:LBL}},y:{...SC,beginAtZero:true,ticks:{...SC.ticks,stepSize:1}}},plugins:{legend:{display:true,position:"top",align:"end",labels:{font:{size:9,family:"'DM Sans',sans-serif"},color:LBL,boxWidth:9,boxHeight:9,padding:8,usePointStyle:true,pointStyle:"circle"}},tooltip:TTP}}});

    // 5. Barras horizontales modelos
    const mc=Object.entries(vp.reduce((a,p)=>{a[p.auto]=(a[p.auto]||0)+1;return a},{})).sort((a,b)=>b[1]-a[1]).slice(0,8);
    mkChart('chartModelos',{type:"bar",data:{labels:mc.map(([m])=>m),datasets:[{data:mc.map(([,n])=>n),backgroundColor:BLUE.concat(BLUE).slice(0,mc.length),borderRadius:3,borderSkipped:false}]},options:{...BASE,indexAxis:"y",scales:{x:{...SC,beginAtZero:true,ticks:{...SC.ticks,stepSize:1}},y:{...SC,grid:{display:false},ticks:{...SC.ticks,color:LBL}}},plugins:{legend:{display:false},tooltip:TTP}}});

    // 6. Barras tipo
    mkChart('chartTipo',{type:"bar",data:{labels:["Nuevos","Usados"],datasets:[{data:[vcNuevo,vcUsado],backgroundColor:["#2e86de","#00b4a6"],borderRadius:4,borderSkipped:false}]},options:{...BASE,scales:{x:{...SC,grid:{display:false},ticks:{...SC.ticks,color:LBL}},y:{...SC,beginAtZero:true,ticks:{...SC.ticks,stepSize:1}}},plugins:{legend:{display:false},tooltip:TTP}}});

    // 7. Línea comportamiento mensual
    mkChart('chartMeses',{type:"line",data:{labels:mesChartData.map(m=>m.mes),datasets:[
      {label:"Leads",data:mesChartData.map(m=>m.t),borderColor:"#2e86de",backgroundColor:"rgba(46,134,222,.12)",fill:true,tension:.4,pointRadius:3,pointBackgroundColor:"#2e86de",pointBorderColor:"#fff",pointBorderWidth:2},
      {label:"Viables",data:mesChartData.map(m=>m.viables),borderColor:"#5ba4e5",borderDash:[4,3],backgroundColor:"transparent",tension:.4,pointRadius:3,pointBackgroundColor:"#5ba4e5",pointBorderColor:"#fff",pointBorderWidth:2},
      {label:"Ventas",data:mesChartData.map(m=>m.vc),borderColor:"#00a86b",backgroundColor:"rgba(0,168,107,.1)",fill:true,tension:.4,pointRadius:4,pointBackgroundColor:"#00a86b",pointBorderColor:"#fff",pointBorderWidth:2}
    ]},options:{...BASE,scales:{x:{...SC,grid:{display:false}},y:{...SC,beginAtZero:true,ticks:{...SC.ticks,stepSize:1}}},plugins:{legend:{display:true,position:"top",align:"end",labels:{font:{size:9,family:"'DM Sans',sans-serif"},color:LBL,boxWidth:10,padding:8,usePointStyle:true,pointStyle:"circle"}},tooltip:TTP}}});
  });
}

function renderProspList(list){
  if(!list.length)return`<div style="padding:20px;text-align:center;color:#a1a3ab;font-size:12px">Sin resultados</div>`;
  return list.map(p=>{const x=sc(p.estatus);return`
  <div class="rp${sel?.id===p.id?" sel":""}" data-id="${p.id}">
    <div style="width:30px;height:30px;background:${x.bg};border:1px solid ${x.bd};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">${FI[p.fuente]||"👤"}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.nombre} ${p.apellido}${p.reasignacion?` <span style="font-size:9px;background:#fef3c7;color:#92400e;padding:1px 5px;font-weight:700;border:1px solid #fcd34d">↷ REASIGNADO</span>`:""}</div>
      <div style="font-size:10px;color:#a1a3ab;margin-top:1px">${p.auto}${p.version?" · "+p.version:""} · ${p.mes} ${p.dia}</div>
          ${p.anuncio?`<div style="font-size:9px;color:#1a6ab1;margin-top:2px;font-weight:600">📢 ${p.anuncio}</div>`:""}
    </div>
    ${pill(p.estatus)}
  </div>`;}).join("");
}

function wireProspList(){
  document.querySelectorAll(".rp[data-id]").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=parseInt(el.dataset.id);
      sel=(agLeads()||[]).find(p=>p.id===id)||null;
      document.querySelectorAll(".rp[data-id]").forEach(r=>r.classList.toggle("sel",parseInt(r.dataset.id)===id));
      document.getElementById("prospDetail").innerHTML=sel?renderProspDetail():"";
      wireProspDetail(document.getElementById("prospDetail"));
    });
  });
}

            `<span style="flex:1;font-size:12px;color:#404759">${item}</span><button class="btn out sm edit-cat-btn" data-i="${i}" style="font-size:9px;padding:3px 6px">Editar</button><button class="btn dng sm del-cat-btn" data-i="${i}" style="font-size:9px;padding:3px 6px">✕</button>`}
          </div>`).join("")}
        </div>
      </div>
    </div>
  </div>`;
  el.querySelectorAll(".cfg-tab-btn").forEach(b=>b.addEventListener("click",()=>{cTab=b.dataset.ct;cNew="";cEi=null;cEv="";renderCfg(el);}));
  el.querySelector("#cNewInp").addEventListener("input",e=>{cNew=e.target.value;});
  el.querySelector("#addCatBtn").addEventListener("click",()=>{
    const v=cNew.trim();if(!v)return;if(ct.list.includes(v))return toast("Ya existe","err");
    const newList=[...ct.list,v].sort();setCatalog(cTab,newList);cNew="";toast(`✓ "${v}" agregado`);saveState();dbSaveCatalog(cTab,newList,agId);renderCfg(el);
  });
  el.querySelectorAll(".edit-cat-btn").forEach(b=>b.addEventListener("click",()=>{cEi=Number(b.dataset.i);cEv=ct.list[cEi];renderCfg(el);}));
  el.querySelectorAll(".del-cat-btn").forEach(b=>b.addEventListener("click",()=>{
    const i=Number(b.dataset.i);if(!confirm(`¿Eliminar "${ct.list[i]}"?`))return;
    const newList=ct.list.filter((_,j)=>j!==i);setCatalog(cTab,newList);toast("✓ Eliminado");saveState();dbSaveCatalog(cTab,newList,agId);renderCfg(el);
  }));
  el.querySelectorAll(".save-cat-btn").forEach(b=>b.addEventListener("click",()=>{
    const i=Number(b.dataset.i);const v=document.getElementById("cEvInp").value.trim();if(!v)return;
    const newList=ct.list.map((x,j)=>j===i?v:x);setCatalog(cTab,newList);cEi=null;cEv="";toast("✓ Actualizado");saveState();dbSaveCatalog(cTab,newList,agId);renderCfg(el);
  }));
  el.querySelectorAll(".cancel-cat-btn").forEach(b=>b.addEventListener("click",()=>{cEi=null;cEv="";renderCfg(el);}));
  el.querySelector("#cEvInp")?.addEventListener("keydown",e=>{if(e.key==="Enter")el.querySelector(".save-cat-btn")?.click();if(e.key==="Escape"){cEi=null;cEv="";renderCfg(el);}});
}

function setCatalog(id,list){
  if(id==="modelos")mods=list;
  else if(id==="anuncios")anus=list;
  else if(id==="razones")razs=list;
  else if(id==="versiones"){
    list.forEach(entry=>{const sep=entry.indexOf(": ");if(sep<0)return;const modelo=entry.substring(0,sep);const version=entry.substring(sep+2);if(!VW_VERSIONS[modelo])VW_VERSIONS[modelo]=[];if(!VW_VERSIONS[modelo].includes(version))VW_VERSIONS[modelo].push(version);});
    Object.keys(VW_VERSIONS).forEach(m=>{VW_VERSIONS[m]=VW_VERSIONS[m].filter(v=>list.includes(m+": "+v));});
  }
}

    </div>

    <div style="display:flex;gap:9px;justify-content:flex-end;padding-top:8px;border-top:1px solid #d0d1d5">

    if(rol==="coordinador"){
      label.textContent="Agencias (puede seleccionar varias)";
      inputs.innerHTML=`<div style="border:1px solid #a1a3ab;padding:8px;background:#fff">`+
        AG.map(a=>`<label style="display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;font-weight:400;text-transform:none;letter-spacing:0;color:#2d3748;margin-bottom:4px"><input type="checkbox" class="ag-check" value="${a.id}" ${curF.includes(a.id)?"checked":""} ${disabled}> Auto Haus ${a.n}</label>`).join("")+`</div>`;
    }else{
      label.textContent="Agencia";
      inputs.innerHTML=`<select class="inp" id="uAgencia" ${disabled}>`+AG.map(a=>`<option value="${a.id}"${a.id===f.agencia?" selected":""}>Auto Haus ${a.n}</option>`).join("")+`</select>`;
    }
  };
  renderAgenciaField(f.rol);
  const updateAvis=()=>{
    const n=bg.querySelector("#uNombre").value;const a=bg.querySelector("#uApellido").value;
    const r=bg.querySelector("#uRol").value;
    bg.querySelector("#avisAsesor").style.display=r==="vendedor"?"block":"none";
    bg.querySelector("#avisNombre").textContent=`${n||"NOMBRE"} ${a||"APELLIDO"}`;
  };
  bg.querySelector("#closeUModal").addEventListener("click",()=>bg.remove());
  bg.querySelector("#cancelUModal").addEventListener("click",()=>bg.remove());
  bg.querySelector("#uRol").addEventListener("change",e=>{updateAvis();renderAgenciaField(e.target.value);});
  bg.querySelector("#uNombre").addEventListener("input",updateAvis);
  bg.querySelector("#uApellido").addEventListener("input",updateAvis);
  bg.querySelector("#saveUModal").addEventListener("click",()=>{
    const nombre=bg.querySelector("#uNombre").value.trim();
    const apellido=bg.querySelector("#uApellido").value.trim();
    const email=bg.querySelector("#uEmail").value.trim();
    const pwd=bg.querySelector("#uPwd").value.trim();
    if(!nombre||!apellido||!email||!pwd)return toast("Todos los campos con * son requeridos","err");
    if(pwd.length<6)return toast("La contraseña debe tener mínimo 6 caracteres","err");
    if(!email.includes("@"))return toast("Correo electrónico inválido","err");
    if(isNew&&users.find(x=>x.email===email))return toast("Este correo ya está registrado","err");
    const rol=bg.querySelector("#uRol").value;
    const asesor=rol==="vendedor"?`${nombre} ${apellido}`:null;
    let agencia=null,agencias=[];
    if(rol==="coordinador"){agencias=[...bg.querySelectorAll(".ag-check:checked")].map(c=>c.value);agencia=agencias[0]||null;}
    else{agencia=bg.querySelector("#uAgencia")?.value||null;agencia=agencia===''?null:agencia;agencias=agencia?[agencia]:[];}
    const data={id:u?.id||Date.now(),nombre,apellido,tel:bg.querySelector("#uTel").value||"",email,pwd,rol,agencia,agencias,asesor,activo:bg.querySelector("#uActivo").value==="1"};
    if(agencias.length){const agMap=JSON.parse(localStorage.getItem('ah_agencias')||'{}');agMap[data.email]=agencias;localStorage.setItem('ah_agencias',JSON.stringify(agMap));}
    if(u){users=users.map(x=>String(x.id)===String(u.id)?data:x);toast("✓ Usuario actualizado");saveState();dbSaveUser(data,false);}
    else{
      users=[...users,data];
      if(data.rol==="vendedor"&&data.agencia){if(!aseMap[data.agencia])aseMap[data.agencia]=[];if(!aseMap[data.agencia].includes(data.asesor))aseMap[data.agencia]=[...aseMap[data.agencia],data.asesor];}
      toast("✓ Usuario creado · Se enviaría confirmación a "+data.email);saveState();dbSaveUser(data,true);
    }
    bg.remove();renderContent();
  });
}

// ── AI ────────────────────────────────────────────────────────────────────────
async function sendAI(inputId,msgsId,ctx){
  const inp=document.getElementById(inputId);if(!inp||!inp.value.trim())return;
  const msg=inp.value.trim();inp.value="";
  const K=kpi(visP());
  aiMsgs.push({role:"user",content:msg});
  const msgsEl=document.getElementById(msgsId);
  if(msgsEl){msgsEl.innerHTML=aiMsgs.map(m=>`<div class="${m.role==="user"?"ai-user":"ai-bot"}">${m.content}</div>`).join("");msgsEl.scrollTop=msgsEl.scrollHeight;}
  try{

const l2db=(l,isNew=false)=>({
  ...(l.id&&!isNaN(l.id)?{id:l.id}:{}),
  agencia_id:l.agencia,fuente:l.fuente||null,anuncio:l.anuncio||null,
  mes:l.mes||null,dia:l.dia||null,nombre:l.nombre,apellido:l.apellido,
  tel:l.tel,email:l.email||null,primer_contacto:l.primerContacto||"SI",
  respondio:l.respondio||"SI",auto:l.auto||null,version:l.version||null,
  tipo:l.tipo||"Nuevo",asesor:l.asesor||null,notas:l.notas||null,
  estatus:l.estatus||"En Proceso",razon:l.razon||null,cita:l.cita||"NO",
  f_cita:l.fCita||null,confirma_cita:l.confirmaCita||null,

  reasignacion:l.reasignacion||null,asesor_original:l.asesorOriginal||null,
  fecha_reasignacion:l.fechaReasignacion||null,historial:l.historial||[],

  updated_at:new Date().toISOString()
});
const db2l=r=>{return{id:r.id,agencia:r.agencia_id,fuente:r.fuente,anuncio:r.anuncio,mes:r.mes,dia:r.dia,nombre:r.nombre,apellido:r.apellido,tel:r.tel,email:r.email,primerContacto:r.primer_contacto,respondio:r.respondio,auto:r.auto,version:r.version,tipo:r.tipo,asesor:r.asesor,notas:r.notas,estatus:r.estatus,razon:r.razon,cita:r.cita,fCita:r.f_cita,confirmaCita:r.confirma_cita,citaReal:r.cita_real,prueba:r.prueba,fVenta:r.f_venta,reasignacion:r.reasignacion,asesorOriginal:r.asesor_original,fechaReasignacion:r.fecha_reasignacion,historial:r.historial||[],tsRegistro:r.ts_registro||null,tsVenta:r.ts_venta||null};};
const u2db=(u,includeAgencias=false)=>({
  ...(u.id&&typeof u.id==="string"&&u.id.includes("-")?{id:u.id}:{}),
  nombre:u.nombre,apellido:u.apellido,tel:u.tel||null,email:u.email,

  activo:u.activo!==false,

});
const db2u=r=>{
  const agMap=JSON.parse(localStorage.getItem('ah_agencias')||'{}');
  const agencias=r.agencias||(agMap[r.email])||[r.agencia_id].filter(Boolean);
  return{id:r.id,nombre:r.nombre,apellido:r.apellido,tel:r.tel,email:r.email,pwd:r.pwd,rol:r.rol,agencia:r.agencia_id,agencias,asesor:r.asesor,activo:r.activo};
};

function showLoader(msg){let el=document.getElementById("sbLoader");if(!el){el=document.createElement("div");el.id="sbLoader";document.body.appendChild(el);}el.style.cssText="position:fixed;inset:0;background:#0f4c81;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:'DM Sans',sans-serif";el.innerHTML=`<div style="text-align:center;color:#fff"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:28px;margin-bottom:6px">Auto Haus<sup style="font-size:13px;font-weight:400">®</sup></div><div style="font-size:10px;opacity:.6;margin-bottom:28px;letter-spacing:2px;text-transform:uppercase">CRM &middot; Red de Agencias VW</div><div style="width:38px;height:38px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px"></div><div style="font-size:12px;opacity:.75">${msg}</div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;}
function hideLoader(){document.getElementById("sbLoader")?.remove();}
function warnToast(msg){const el=document.createElement("div");el.style.cssText="position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#f5a623;color:#fff;padding:10px 18px;font-size:11px;font-weight:700;z-index:600;letter-spacing:.3px;text-transform:uppercase;box-shadow:0 4px 16px rgba(0,0,0,.2)";el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),5000);}

const LS_KEY="autohaus_crm_v1";
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify({leads,users,aseMap,mods,anus,razs,savedAt:new Date().toISOString()}));}catch(e){}}
function loadState(){try{const s=JSON.parse(localStorage.getItem(LS_KEY)||"null");if(!s)return false;if(s.leads)leads=s.leads;if(s.users)users=s.users;if(s.aseMap)aseMap=s.aseMap;if(s.mods)mods=s.mods;if(s.anus)anus=s.anus;if(s.razs)razs=s.razs;return true;}catch(e){return false;}}
function clearState(){if(!confirm("¿Borrar todos los datos y reiniciar?"))return;localStorage.removeItem(LS_KEY);location.reload();}

async function loadFromSupabase(){
  try{
    showLoader("Conectando con la base de datos...");
    const [dbLeads,dbUsers,dbCats]=await Promise.all([
      sbGet("leads","?select=*&order=created_at.desc").catch(e=>{console.error("leads:",e);return[];}),
      sbGet("usuarios","?select=*&order=nombre.asc").catch(e=>{console.error("usuarios:",e);return[];}),
      sbGet("catalogos","?select=*&order=valor.asc").catch(e=>{console.error("catalogos:",e);return[];}),
    ]);
    leads={"ag1":[],"ag2":[],"ag3":[],"ag4":[]};
    dbLeads.forEach(r=>{const l=db2l(r);if(!leads[l.agencia])leads[l.agencia]=[];leads[l.agencia].push(l);});
    users=dbUsers.map(db2u);
    const agMapLoad=JSON.parse(localStorage.getItem('ah_agencias')||'{}');
    users=users.map(u=>{if(u.rol==="coordinador"&&agMapLoad[u.email]&&agMapLoad[u.email].length)return{...u,agencias:agMapLoad[u.email]};return u;});
    aseMap={"ag1":[],"ag2":[],"ag3":[],"ag4":[]};
    users.filter(u=>u.activo&&u.rol==="vendedor"&&u.asesor).forEach(u=>{userAgencias(u).forEach(agId=>{if(!aseMap[agId])aseMap[agId]=[];if(!aseMap[agId].includes(u.asesor))aseMap[agId].push(u.asesor);});});
    const cm={};dbCats.forEach(c=>{if(!cm[c.tipo])cm[c.tipo]=[];cm[c.tipo].push(c.valor);});
    if(cm.modelos?.length)mods=cm.modelos;if(cm.anuncios?.length)anus=cm.anuncios;if(cm.razones?.length)razs=cm.razones;
    hideLoader();return true;
  }catch(e){console.error("Supabase error:",e);hideLoader();loadState();warnToast("Sin conexion a BD - usando datos locales");return false;}
}

async function dbSaveLead(lead,isNew){
  try{const d=l2db(lead,isNew);if(isNew){delete d.id;const r=await sbPost("leads",[d]);return r[0]?.id;}else{await sbPatch("leads",`id=eq.${lead.id}`,d);return lead.id;}}
  catch(e){console.error("dbSaveLead:",e);saveState();}
}
async function dbDeleteLead(id){try{await sbDel("leads",`id=eq.${id}`);}catch(e){console.error(e);saveState();}}
async function dbUpdateEstatus(id,estatus,historial){try{await sbPatch("leads",`id=eq.${id}`,{estatus,historial,updated_at:new Date().toISOString()});}catch(e){console.error(e);saveState();}}
async function dbSaveUser(user,isNew){
  const trySave=async(withAg)=>{const d=u2db(user,withAg);if(isNew){delete d.id;return await sbPost("usuarios",[d]);}else{return await sbPatch("usuarios",`id=eq.${user.id}`,d);}};
  try{const r=await trySave(true);const newId=isNew?r[0]?.id:user.id;if(isNew&&newId){users=users.map(x=>String(x.id)===String(user.id)?{...x,id:newId}:x);saveState();}return newId;}
  catch(e){try{const r=await trySave(false);const newId=isNew?r[0]?.id:user.id;if(isNew&&newId){users=users.map(x=>String(x.id)===String(user.id)?{...x,id:newId}:x);saveState();}return newId;}catch(e2){console.error("dbSaveUser:",e2);toast("Error al guardar usuario: "+e2.message,"err");saveState();}}
}
async function dbDeleteUser(id){try{await sbDel("usuarios",`id=eq.${id}`);console.log("User deleted:",id);}catch(e){console.error(e);saveState();}}
async function dbToggleUser(id,activo){try{await sbPatch("usuarios",`id=eq.${id}`,{activo});}catch(e){console.error(e);saveState();}}
async function dbSaveCatalog(tipo,valores,agId){
  try{const q=agId?`tipo=eq.${tipo}&agencia_id=eq.${agId}`:`tipo=eq.${tipo}`;await sbDel("catalogos",q);if(valores.length)await sbPost("catalogos",valores.map(v=>({tipo,valor:v,agencia_id:agId||null})));}
  catch(e){console.error(e);saveState();}
}
async function dbLogin(email,pwd){
  try{const r=await sbGet("usuarios","?activo=eq.true&select=*");if(r&&r.length)users=r.map(db2u);const match=r.find(u=>u.email===email&&u.pwd===pwd);return match?db2u(match):null;}
  catch(e){console.error(e);return users.find(u=>u.activo&&u.email===email&&u.pwd===pwd)||null;}
}
